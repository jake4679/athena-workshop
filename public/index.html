<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Athena Query Console</title>
    <link href="https://cdn.jsdelivr.net/npm/tabulator-tables@6.3.0/dist/css/tabulator.min.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-1: #eef6ff;
        --bg-2: #f9f7f2;
        --panel: rgba(255, 255, 255, 0.86);
        --ink: #1f2933;
        --muted: #5f6b76;
        --accent: #0f766e;
        --accent-2: #0ea5e9;
        --danger: #b42318;
        --ok: #027a48;
        --border: rgba(15, 23, 42, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Space Grotesk", sans-serif;
        background:
          radial-gradient(circle at 10% 20%, rgba(14, 165, 233, 0.15), transparent 35%),
          radial-gradient(circle at 80% 10%, rgba(15, 118, 110, 0.16), transparent 30%),
          linear-gradient(160deg, var(--bg-1), var(--bg-2));
      }

      .shell {
        width: 100%;
        max-width: none;
        margin: 16px 8px;
        padding: 0 2px;
      }

      .layout {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr) 300px;
        gap: 14px;
        align-items: start;
        min-width: 0;
      }

      .layout.left-collapsed {
        grid-template-columns: 52px minmax(0, 1fr) 300px;
      }

      .layout.right-collapsed {
        grid-template-columns: 280px minmax(0, 1fr) 52px;
      }

      .layout.left-collapsed.right-collapsed {
        grid-template-columns: 52px minmax(0, 1fr) 52px;
      }

      .card {
        background: var(--panel);
        backdrop-filter: blur(8px);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: 0 8px 30px rgba(2, 6, 23, 0.08);
        min-width: 0;
      }

      .header {
        padding: 16px 18px 10px;
      }

      .title {
        margin: 0;
        font-size: 1.25rem;
        letter-spacing: 0.02em;
      }

      .subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .section {
        padding: 12px 18px 18px;
        min-width: 0;
      }

      .main-stack {
        display: grid;
        gap: 14px;
        min-width: 0;
      }

      .assistant-body {
        display: grid;
        gap: 10px;
      }

      .assistant-card.collapsed .assistant-body {
        display: none;
      }

      .assistant-response {
        min-height: 160px;
        max-height: 60vh;
        resize: vertical;
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.9);
        padding: 10px 12px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.8rem;
        line-height: 1.45;
      }

      .assistant-thread {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .assistant-empty {
        color: var(--muted);
      }

      .assistant-msg {
        max-width: 88%;
        border-radius: 10px;
        border: 1px solid var(--border);
        padding: 8px 10px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        position: relative;
      }

      .assistant-msg-markdown {
        white-space: normal;
      }

      .assistant-msg-markdown p {
        margin: 0 0 8px;
      }

      .assistant-msg-markdown p:last-child {
        margin-bottom: 0;
      }

      .assistant-msg-markdown pre {
        margin: 8px 0;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.8);
        overflow: auto;
      }

      .assistant-msg-markdown code {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.78rem;
      }

      .assistant-msg-markdown ul,
      .assistant-msg-markdown ol {
        margin: 0 0 8px 18px;
      }

      .assistant-msg-markdown h1,
      .assistant-msg-markdown h2,
      .assistant-msg-markdown h3,
      .assistant-msg-markdown h4 {
        margin: 8px 0 6px;
        line-height: 1.2;
      }

      .assistant-msg-wrap {
        position: relative;
        display: flex;
      }

      .assistant-msg-wrap-user {
        justify-content: flex-end;
      }

      .assistant-msg-wrap-assistant,
      .assistant-msg-wrap-tool {
        justify-content: flex-start;
      }

      .assistant-msg-user {
        background: #e5f1ff;
      }

      .assistant-msg-assistant {
        background: #f3f7eb;
      }

      .assistant-msg-tool {
        background: #f7f7f8;
        color: #4b5563;
      }

      .assistant-msg-thinking {
        background: #f3f7eb;
        min-width: 58px;
      }

      .assistant-thinking-dots {
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }

      .assistant-thinking-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #5f6b76;
        animation: assistant-dot-bloop 1s infinite ease-in-out;
      }

      .assistant-thinking-dot:nth-child(2) {
        animation-delay: 0.14s;
      }

      .assistant-thinking-dot:nth-child(3) {
        animation-delay: 0.28s;
      }

      @keyframes assistant-dot-bloop {
        0%, 80%, 100% {
          transform: translateY(0);
          opacity: 0.5;
        }
        40% {
          transform: translateY(-4px);
          opacity: 1;
        }
      }

      .assistant-use-btn {
        position: absolute;
        top: 4px;
        right: 4px;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--ink);
        border-radius: 6px;
        font-size: 0.68rem;
        padding: 2px 6px;
        cursor: pointer;
      }

      .assistant-msg-with-use {
        padding-top: 22px;
      }

      .assistant-prompt {
        width: 100%;
        min-height: 90px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.82rem;
        resize: vertical;
        background: #fff;
        color: var(--ink);
      }

      .assistant-toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
      }

      .assistant-meta {
        color: var(--muted);
        font-size: 0.78rem;
        font-family: "IBM Plex Mono", monospace;
      }

      .assistant-actions {
        display: flex;
        gap: 8px;
      }

      .assistant-actions button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .editor-shell {
        height: 260px;
        min-height: 160px;
        max-height: 70vh;
        resize: vertical;
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fff;
      }

      #editor {
        height: 100%;
        border: 0;
        border-radius: 10px;
        overflow: hidden;
      }

      #editorFallback {
        display: none;
        width: 100%;
        height: 100%;
        border: 0;
        border-radius: 10px;
        padding: 12px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 14px;
        line-height: 1.5;
        resize: none;
      }

      .controls {
        margin-top: 12px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        cursor: pointer;
        transition: transform 120ms ease, box-shadow 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(0);
      }

      .btn-accent {
        color: white;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        box-shadow: 0 6px 18px rgba(14, 116, 144, 0.26);
      }

      .btn-light {
        color: var(--ink);
        background: #e6eef8;
      }

      .status-strip {
        margin-top: 12px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.75);
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.86rem;
        white-space: pre-wrap;
      }

      .status-ok {
        color: var(--ok);
      }

      .status-err {
        color: var(--danger);
      }

      .download-controls {
        margin-top: 10px;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .download-format {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.8rem;
        background: #fff;
        color: var(--ink);
      }

      .results {
        min-height: 240px;
        margin-top: 10px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.92);
        padding: 12px;
        overflow: auto;
        min-width: 0;
      }

      .debug-banner {
        margin-top: 10px;
        border: 1px dashed var(--border);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.75);
        padding: 8px 10px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.75rem;
        color: var(--muted);
        white-space: pre-wrap;
      }

      .query-list {
        display: grid;
        gap: 8px;
      }

      .schema-panel {
        overflow: hidden;
      }

      .schema-controls {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
        align-items: center;
      }

      .database-select {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.8rem;
        background: #fff;
        color: var(--ink);
      }

      .schema-filter {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.8rem;
        background: #fff;
        color: var(--ink);
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .icon-toggle {
        width: 24px;
        height: 24px;
        border-radius: 6px;
        padding: 0;
        line-height: 1;
        font-size: 0.9rem;
      }

      .schema-tree {
        max-height: 700px;
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        padding: 6px;
      }

      .schema-tree details {
        border-bottom: 1px solid var(--border);
        padding: 6px 4px;
      }

      .schema-tree details:last-child {
        border-bottom: none;
      }

      .schema-tree summary {
        cursor: pointer;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.8rem;
        white-space: nowrap;
        overflow-x: auto;
        overflow-y: hidden;
        display: block;
      }

      .schema-columns {
        list-style: none;
        margin: 8px 0 0;
        padding: 0 0 0 10px;
      }

      .schema-column-item {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.76rem;
        line-height: 1.4;
        color: var(--muted);
        margin: 2px 0;
        white-space: nowrap;
      }

      .schema-column-type {
        color: var(--ink);
      }

      .layout.left-collapsed .schema-tree,
      .layout.left-collapsed .schema-title,
      .layout.left-collapsed .schema-refresh {
        display: none;
      }

      .layout.left-collapsed .schema-controls {
        margin-bottom: 0;
      }

      .layout.right-collapsed .query-list-title,
      .layout.right-collapsed .query-list-refresh,
      .layout.right-collapsed .query-list-items {
        display: none;
      }

      .layout.right-collapsed .query-list-controls {
        margin-bottom: 0;
      }

      .query-list-controls {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .query-list-items {
        max-height: 620px;
        overflow: auto;
        display: grid;
        gap: 6px;
      }

      .query-item {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.8);
        padding: 8px;
        cursor: pointer;
        text-align: left;
      }

      .query-item.active {
        border-color: var(--accent-2);
        box-shadow: 0 0 0 1px rgba(14, 165, 233, 0.35);
      }

      .query-item-id {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.77rem;
        word-break: break-all;
      }

      .query-item-meta {
        margin-top: 4px;
        font-size: 0.73rem;
        color: var(--muted);
      }

      .meta-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .meta-field {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.86);
        padding: 8px 10px;
      }

      .meta-label {
        display: block;
        color: var(--muted);
        font-size: 0.75rem;
        margin-bottom: 4px;
      }

      .meta-value {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.8rem;
        word-break: break-word;
      }

      .meta-input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 8px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.8rem;
        background: #fff;
        color: var(--ink);
      }

      .table-wrap {
        width: 100%;
        max-width: 100%;
        min-width: 0;
        overflow-x: auto;
        overflow-y: auto;
      }

      .tabulator {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.8rem;
        border: 1px solid var(--border);
        border-radius: 10px;
        width: max-content;
        min-width: 100%;
      }

      .tabulator .tabulator-row.tabulator-selected {
        background: #fff59d;
      }

      .results-basic-table {
        width: 100%;
        border-collapse: collapse;
      }

      .results-basic-table th,
      .results-basic-table td {
        border-bottom: 1px solid var(--border);
        padding: 6px 8px;
        text-align: left;
      }

      .results-basic-table tbody tr {
        cursor: pointer;
      }

      .results-basic-table tbody tr.results-basic-row-selected {
        background: #fff59d;
      }

      pre {
        margin: 0;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.83rem;
        line-height: 1.45;
      }

      @media (max-width: 700px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .shell {
          margin: 10px 4px;
          padding: 0 2px;
        }

        #editor {
          height: 100%;
        }

        .editor-shell {
          height: 220px;
        }

        .meta-grid {
          grid-template-columns: 1fr;
        }

        .controls {
          flex-direction: column;
          align-items: stretch;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div id="appLayout" class="layout">
        <section class="card schema-panel">
          <div class="section">
            <div class="panel-header">
              <h2 class="schema-title" style="margin: 0; font-size: 1rem">Athena Tables</h2>
              <button id="toggleSchemaBtn" class="btn-light schema-toggle icon-toggle" type="button"><</button>
            </div>
            <div class="schema-controls">
              <select id="databaseSelect" class="database-select" aria-label="Athena database selector"></select>
            </div>
            <div class="schema-controls">
              <input id="schemaFilterInput" class="schema-filter" type="text" placeholder="Filter tables..." />
              <button id="refreshSchemaBtn" class="btn-light schema-refresh" type="button">Refresh</button>
            </div>
            <div id="schemaTree" class="schema-tree"></div>
          </div>
        </section>

        <div class="main-stack">
          <section id="assistantCard" class="card assistant-card">
            <div class="section">
              <div class="panel-header">
                <h2 style="margin: 0; font-size: 1rem">Assistant</h2>
                <button id="toggleAssistantBtn" class="btn-light icon-toggle" type="button">-</button>
              </div>
              <div class="assistant-body">
                <div id="assistantResponse" class="assistant-response">Assistant responses will appear here.</div>
                <textarea
                  id="assistantPromptInput"
                  class="assistant-prompt"
                  placeholder="Ask the assistant to explain or fix syntax..."
                ></textarea>
                <div class="assistant-toolbar">
                  <div id="assistantMeta" class="assistant-meta">Status: idle | Elapsed: 00:00</div>
                  <div class="assistant-actions">
                    <button id="sendAssistantBtn" class="btn-accent" type="button">Send</button>
                    <button id="cancelAssistantBtn" class="btn-light" type="button">Cancel</button>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section class="card">
            <header class="header">
              <h1 class="title">Athena Query Console</h1>
              <p class="subtitle">Write SQL, submit, track progress, and inspect results.</p>
            </header>

            <div class="section">
              <div class="editor-shell">
                <div id="editor"></div>
                <textarea id="editorFallback" aria-label="SQL editor fallback"></textarea>
              </div>
              <div class="controls">
                <button id="newQueryBtn" class="btn-light" type="button">New Query</button>
                <button id="submitBtn" class="btn-accent" type="button">Submit Query</button>
              </div>
              <div id="status" class="status-strip">Idle</div>
            </div>
          </section>

          <section class="card">
            <div class="section">
              <h2 style="margin: 0 0 8px; font-size: 1rem">Results</h2>
              <div class="meta-grid">
                <div class="meta-field">
                  <span class="meta-label">Name</span>
                  <input id="metaName" class="meta-input" type="text" placeholder="Query name" />
                </div>
                <div class="meta-field">
                  <span class="meta-label">Query ID</span>
                  <div id="metaQueryId" class="meta-value">-</div>
                </div>
                <div class="meta-field">
                  <span class="meta-label">Status</span>
                  <div id="metaStatus" class="meta-value">-</div>
                </div>
                <div class="meta-field">
                  <span class="meta-label">Submitted At</span>
                  <div id="metaSubmittedAt" class="meta-value">-</div>
                </div>
                <div class="meta-field">
                  <span class="meta-label">Result Received At</span>
                  <div id="metaResultReceivedAt" class="meta-value">-</div>
                </div>
              </div>
              <div class="results">
                <div id="tabularView" class="table-wrap" style="display: none"></div>
                <pre id="resultsView">No query selected yet.</pre>
              </div>
              <div class="download-controls">
                <select id="downloadFormat" class="download-format" aria-label="Download format">
                  <option value="csv">CSV</option>
                  <option value="excel">Excel (.xlsx)</option>
                  <option value="parquet">Parquet (.parquet)</option>
                </select>
                <button id="downloadResultsBtn" class="btn-light" type="button">Download Results</button>
              </div>
              <div id="resultsDebug" class="debug-banner">Debug: idle</div>
            </div>
          </section>
        </div>

        <section class="card">
          <div class="section query-list">
            <div class="panel-header">
              <h2 class="query-list-title" style="margin: 0; font-size: 1rem">Saved Queries</h2>
              <button id="toggleQueryListBtn" class="btn-light query-list-toggle icon-toggle" type="button">></button>
            </div>
            <div class="query-list-controls">
              <button id="deleteQueryBtn" class="btn-light query-list-refresh" type="button">Delete Selected</button>
              <button id="refreshListBtn" class="btn-light query-list-refresh" type="button">Refresh List</button>
            </div>
            <div id="queryListItems" class="query-list-items"></div>
          </div>
        </section>
      </div>
    </main>

    <script src="https://unpkg.com/sql-formatter@15.4.10/dist/sql-formatter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script>
      window.require = { paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.53.0/min/vs' } };
      window.MonacoEnvironment = {
        getWorkerUrl: function () {
          const code = [
            "self.MonacoEnvironment = { baseUrl: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.53.0/min/' };",
            "importScripts('https://cdn.jsdelivr.net/npm/monaco-editor@0.53.0/min/vs/base/worker/workerMain.js');"
          ].join('\\n');
          return `data:text/javascript;charset=utf-8,${encodeURIComponent(code)}`;
        }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.53.0/min/vs/loader.js"></script>
    <script>
      let editor;
      let fallbackMode = false;
      let pollTimer = null;
      let queryListTimer = null;
      let resultsTable = null;
      let selectedBasicTableRow = null;
      let selectedQueryId = null;
      let schemaCollapsed = false;
      let queryListCollapsed = false;
      let assistantCollapsed = false;
      let schemaCache = { database: null, tables: [] };
      let schemaPrefetchGeneration = 0;
      let databaseList = [];
      let selectedDatabase = null;
      let validateTimer = null;
      let assistantStatusTimer = null;
      let assistantElapsedTimer = null;
      let assistantRunStartedAt = null;
      let assistantRunStatus = 'IDLE';
      let assistantPollQueryId = null;
      let assistantVisibleMessages = [];
      let assistantServerMessages = [];
      let assistantPendingUserMessage = null;
      let assistantThinking = false;
      let completionProviderRegistered = false;
      const VALIDATION_DEBOUNCE_MS = 650;
      const UI_STATE_STORAGE_KEY = 'athena_query_console_ui_state_v1';
      const DEFAULT_PAGE_SIZE = 25;
      const SQL_KEYWORDS = [
        'SELECT', 'FROM', 'WHERE', 'GROUP BY', 'ORDER BY', 'LIMIT', 'OFFSET', 'JOIN', 'LEFT JOIN',
        'RIGHT JOIN', 'INNER JOIN', 'FULL JOIN', 'ON', 'WITH', 'AS', 'DISTINCT', 'HAVING',
        'UNION', 'UNION ALL', 'INSERT', 'UPDATE', 'DELETE', 'CREATE TABLE', 'DROP TABLE',
        'ALTER TABLE', 'EXPLAIN', 'SHOW TABLES', 'DESCRIBE', 'CAST', 'CASE', 'WHEN', 'THEN',
        'ELSE', 'END', 'AND', 'OR', 'NOT', 'IN', 'LIKE', 'BETWEEN', 'IS NULL', 'IS NOT NULL'
      ];

      const appLayoutEl = document.getElementById('appLayout');
      const statusEl = document.getElementById('status');
      const resultsEl = document.getElementById('resultsView');
      const tabularViewEl = document.getElementById('tabularView');
      const newQueryBtn = document.getElementById('newQueryBtn');
      const submitBtn = document.getElementById('submitBtn');
      const fallbackEditorEl = document.getElementById('editorFallback');
      const metaNameEl = document.getElementById('metaName');
      const metaQueryIdEl = document.getElementById('metaQueryId');
      const metaStatusEl = document.getElementById('metaStatus');
      const metaSubmittedAtEl = document.getElementById('metaSubmittedAt');
      const metaResultReceivedAtEl = document.getElementById('metaResultReceivedAt');

      const queryListItemsEl = document.getElementById('queryListItems');

      const assistantPromptInputEl = document.getElementById('assistantPromptInput');
      const assistantMetaEl = document.getElementById('assistantMeta');
      const sendAssistantBtn = document.getElementById('sendAssistantBtn');
      const cancelAssistantBtn = document.getElementById('cancelAssistantBtn');
      const schemaTreeEl = document.getElementById('schemaTree');
      const databaseSelectEl = document.getElementById('databaseSelect');
