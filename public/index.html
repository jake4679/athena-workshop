      function isSubmitShortcut(event) {
        return event.key === 'Enter' && (event.ctrlKey || event.metaKey);
      }

      function getEditorValue() {
        if (fallbackMode) {
          return fallbackEditorEl.value;
        }
        return editor ? editor.getValue() : '';
      }

      function setEditorValue(value) {
        if (fallbackMode) {
          fallbackEditorEl.value = value;
          return;
        }
        if (editor) {
          editor.setValue(value);
        }
      }

      function enableFallbackEditor(initialValue) {
        fallbackMode = true;
        document.getElementById('editor').style.display = 'none';
        fallbackEditorEl.style.display = 'block';
        fallbackEditorEl.value = initialValue;
        renderStatus('Monaco failed to load. Using fallback editor.', true);
      }

      function renderStatus(message, isError) {
        statusEl.textContent = message;
        statusEl.classList.toggle('status-err', Boolean(isError));
        statusEl.classList.toggle('status-ok', !isError);
      }

      function formatElapsed(ms) {
        const totalSeconds = Math.max(0, Math.floor(ms / 1000));
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        if (hours > 0) {
          return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }
        return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
      }

      function stopAssistantElapsedTimer() {
        if (assistantElapsedTimer) {
          clearInterval(assistantElapsedTimer);
          assistantElapsedTimer = null;
        }
      }

      function updateAssistantMeta() {
        const statusText = String(assistantRunStatus || 'IDLE').toLowerCase();
        let elapsedText = '00:00';
        if (assistantRunStartedAt) {
          const elapsed = Date.now() - assistantRunStartedAt.getTime();
          elapsedText = formatElapsed(elapsed);
        }
        assistantMetaEl.textContent = `Status: ${statusText} | Elapsed: ${elapsedText}`;
      }

      function startAssistantElapsedTimer(startedAtIso) {
        stopAssistantElapsedTimer();
        assistantRunStartedAt = startedAtIso ? new Date(startedAtIso) : null;
        updateAssistantMeta();
        if (!assistantRunStartedAt || Number.isNaN(assistantRunStartedAt.getTime())) {
          assistantRunStartedAt = null;
          return;
        }
        assistantElapsedTimer = setInterval(() => {
          updateAssistantMeta();
        }, 1000);
      }

      function setAssistantRunStatus(status, runStartedAt) {
        assistantRunStatus = status || 'IDLE';
        assistantThinking = assistantRunStatus === 'RUNNING' || assistantRunStatus === 'CANCELLING';
        if (assistantRunStatus === 'RUNNING' || assistantRunStatus === 'CANCELLING') {
          startAssistantElapsedTimer(runStartedAt || (assistantRunStartedAt ? assistantRunStartedAt.toISOString() : null));
        } else {
          if (runStartedAt) {
            assistantRunStartedAt = new Date(runStartedAt);
          }
          stopAssistantElapsedTimer();
          updateAssistantMeta();
        }

        const running = assistantRunStatus === 'RUNNING' || assistantRunStatus === 'CANCELLING';
        sendAssistantBtn.disabled = running;
        cancelAssistantBtn.disabled = !running;
        renderAssistantThread();
      }

      function renderAssistantMessages(messages) {
        assistantServerMessages = Array.isArray(messages) ? messages : [];
        if (assistantPendingUserMessage) {
          const pendingNormalized = String(assistantPendingUserMessage || '').trim();
          const hasMatchingServerUser = assistantServerMessages.some(
            (message) =>
              String(message.role || '').toLowerCase() === 'user' &&
              String(message.content || '').trim() === pendingNormalized
          );
          if (hasMatchingServerUser) {
            assistantPendingUserMessage = null;
          }
        }
        renderAssistantThread();
      }

      function buildAssistantRenderableMessages() {
        const visible = assistantServerMessages.filter((message) => ['user', 'assistant', 'tool'].includes(message.role));
        if (assistantPendingUserMessage) {
          const pendingContent = String(assistantPendingUserMessage || '').trim();
          const last = visible[visible.length - 1];
          const isDuplicateTail =
            last &&
            String(last.role || '').toLowerCase() === 'user' &&
            String(last.content || '').trim() === pendingContent;
          if (!isDuplicateTail) {
            visible.push({
              role: 'user',
              content: pendingContent
            });
          }
        }
        return visible;
      }

      function renderAssistantThread() {
        assistantVisibleMessages = [];
        const visible = buildAssistantRenderableMessages();
        if (visible.length === 0 && !assistantThinking) {
          assistantResponseEl.innerHTML = '<div class="assistant-empty">Assistant responses will appear here.</div>';
          return;
        }

        assistantVisibleMessages = visible.map((message) => ({
          role: String(message.role || '').toLowerCase(),
          content: String(message.content || '').trim()
        }));

        const html = visible
          .map((message, index) => {
            const role = String(message.role || '').toLowerCase();
            const roleClass =
              role === 'user'
                ? 'assistant-msg-user'
                : role === 'assistant'
                  ? 'assistant-msg-assistant'
                  : 'assistant-msg-tool';
            const wrapClass =
              role === 'user'
                ? 'assistant-msg-wrap-user'
                : role === 'assistant'
                  ? 'assistant-msg-wrap-assistant'
                  : 'assistant-msg-wrap-tool';
            const content = String(message.content || '').trim() || '(empty)';
            const useButton =
              role === 'assistant'
                ? `<button class="assistant-use-btn" type="button" data-assistant-index="${index}">Use</button>`
                : '';
            const extraClass = role === 'assistant' ? 'assistant-msg-with-use assistant-msg-markdown' : '';
            const renderedContent = role === 'assistant' ? renderMarkdownContent(content) : escapeHtml(content);
            return `<div class="assistant-msg-wrap ${wrapClass}"><div class="assistant-msg ${roleClass} ${extraClass}">${useButton}${renderedContent}</div></div>`;
          })
          .join('');
        const thinkingHtml = assistantThinking
          ? `<div class="assistant-msg-wrap assistant-msg-wrap-assistant"><div class="assistant-msg assistant-msg-assistant assistant-msg-thinking"><span class="assistant-thinking-dots"><span class="assistant-thinking-dot"></span><span class="assistant-thinking-dot"></span><span class="assistant-thinking-dot"></span></span></div></div>`
          : '';
        assistantResponseEl.innerHTML = `<div class="assistant-thread">${html}${thinkingHtml}</div>`;
        assistantResponseEl.scrollTop = assistantResponseEl.scrollHeight;
      }

      function renderJson(data) {
        if (resultsTable) {
          resultsTable.destroy();
          resultsTable = null;
        }
        selectedBasicTableRow = null;
        tabularViewEl.innerHTML = '';
        tabularViewEl.style.display = 'none';
        resultsEl.textContent = JSON.stringify(data, null, 2);
        resultsEl.style.display = 'block';
        resultsDebugEl.textContent = 'Debug: rendering JSON mode';
      }

      function setMetaFields(meta) {
        metaNameEl.value = meta.name || '';
        metaNameEl.dataset.lastSavedValue = meta.name || '';
        metaQueryIdEl.textContent = meta.queryId || '-';
        metaStatusEl.textContent = meta.status || '-';
        metaSubmittedAtEl.textContent = meta.submittedAt || '-';
        metaResultReceivedAtEl.textContent = meta.resultReceivedAt || '-';
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function renderMarkdownContent(value) {
        const raw = String(value || '');
        if (!raw.trim()) {
          return '(empty)';
        }

        if (!window.marked || !window.DOMPurify) {
          return escapeHtml(raw);
        }

        const parsed = window.marked.parse(raw, { breaks: true, gfm: true });
        return window.DOMPurify.sanitize(parsed);
      }

      function parseDownloadFileName(contentDisposition, fallbackName) {
        if (typeof contentDisposition !== 'string' || !contentDisposition) {
          return fallbackName;
        }
        const utf8Match = contentDisposition.match(/filename\\*=UTF-8''([^;]+)/i);
        if (utf8Match && utf8Match[1]) {
          try {
            return decodeURIComponent(utf8Match[1]);
          } catch (_error) {
            return utf8Match[1];
          }
        }
        const basicMatch = contentDisposition.match(/filename=\"?([^\";]+)\"?/i);
        if (basicMatch && basicMatch[1]) {
          return basicMatch[1];
        }
        return fallbackName;
      }

      function renderBasicTable(columns, rows) {
        selectedBasicTableRow = null;
        const safeRows = Array.isArray(rows) ? rows : [];
        const header = columns.map((column) => `<th>${escapeHtml(column)}</th>`).join('');
        const body = safeRows
          .map((row, rowIndex) => {
            const rowCells = Array.isArray(row) ? row : [];
            const cells = columns
              .map((_, index) => {
                const value = rowCells[index];
                return `<td>${value === null || value === undefined ? '' : escapeHtml(value)}</td>`;
              })
              .join('');
            return `<tr data-row-index="${rowIndex}">${cells}</tr>`;
          })
          .join('');
        tabularViewEl.innerHTML = `<table class="results-basic-table"><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table>`;
        tabularViewEl.style.display = 'block';
        resultsEl.style.display = 'none';
        resultsDebugEl.textContent = `Debug: basic table fallback | columns=${columns.length} rows=${safeRows.length}`;

        const tbody = tabularViewEl.querySelector('tbody');
        if (tbody) {
          tbody.addEventListener('click', (event) => {
            const target = event.target;
            if (!(target instanceof HTMLElement)) {
              return;
            }
            const row = target.closest('tr');
            if (!row) {
              return;
            }
            if (selectedBasicTableRow && selectedBasicTableRow !== row) {
              selectedBasicTableRow.classList.remove('results-basic-row-selected');
            }
            if (selectedBasicTableRow === row) {
              row.classList.remove('results-basic-row-selected');
              selectedBasicTableRow = null;
              return;
            }
            row.classList.add('results-basic-row-selected');
            selectedBasicTableRow = row;
          });
        }
      }

      function mapRowsToObjects(columns, rows) {
        if (!Array.isArray(rows)) {
          return [];
        }
        return rows.map((row) => {
          const obj = {};
          columns.forEach((_, index) => {
            obj[`c${index}`] = Array.isArray(row) ? row[index] ?? null : null;
          });
          return obj;
        });
      }

      function normalizeTabulatorData(columns, dataRows) {
        if (!Array.isArray(dataRows)) {
          return [];
        }
        if (dataRows.length === 0) {
          return [];
        }

        const first = dataRows[0];
        if (Array.isArray(first)) {
          return mapRowsToObjects(columns, dataRows);
        }

        if (typeof first === 'object' && first !== null) {
          if (Object.prototype.hasOwnProperty.call(first, 'c0')) {
            return dataRows;
          }

          return dataRows.map((row) => {
            const out = {};
            columns.forEach((columnName, index) => {
              out[`c${index}`] = row[columnName] ?? null;
            });
            return out;
          });
        }

        return [];
      }

      function renderTabulatorTable(queryId, columns, initialData) {
        if (!Array.isArray(columns) || columns.length === 0) {
          renderJson({ message: 'No tabular columns available' });
          return;
        }

        if (typeof Tabulator === 'undefined') {
          renderStatus('Tabulator failed to load, using basic table fallback.', true);
          renderBasicTable(columns, initialData);
          return;
        }

        if (resultsTable) {
          resultsTable.destroy();
          resultsTable = null;
        }

        tabularViewEl.innerHTML = '';
        tabularViewEl.style.display = 'block';
        resultsEl.style.display = 'none';
        resultsDebugEl.textContent = `Debug: initializing Tabulator | columns=${columns.length} initialRows=${Array.isArray(initialData) ? initialData.length : 0}`;

        function toHttpUrlOrNull(value) {
          if (typeof value !== 'string') {
            return null;
          }
          const trimmed = value.trim();
          if (!trimmed) {
            return null;
          }
          try {
            const parsed = new URL(trimmed);
            if (parsed.protocol === 'http:' || parsed.protocol === 'https:') {
              return parsed.toString();
            }
          } catch (_error) {
            return null;
          }
          return null;
        }

        function linkAwareCellFormatter(cell) {
          const rawValue = cell.getValue();
          const url = toHttpUrlOrNull(rawValue);
          if (!url) {
            return rawValue === null || rawValue === undefined ? '' : escapeHtml(String(rawValue));
          }
          const safeHref = escapeHtml(url);
          const safeLabel = escapeHtml(String(rawValue));
          return `<a href="${safeHref}" target="_blank" rel="noopener noreferrer">${safeLabel}</a>`;
        }

        const tableColumns = columns.map((name, index) => ({
          title: String(name),
          field: `c${index}`,
          headerSort: false,
          formatter: linkAwareCellFormatter
        }));
        const normalizedInitialData = normalizeTabulatorData(columns, initialData);
        resultsDebugEl.textContent =
          `Debug: initializing Tabulator | columns=${columns.length} initialRows=${normalizedInitialData.length}`;

        try {
          resultsTable = new Tabulator(tabularViewEl, {
            layout: 'fitData',
            maxHeight: '420px',
            columns: tableColumns,
            selectableRows: 1,
            pagination: true,
            paginationMode: 'remote',
            paginationInitialPage: 1,
            paginationSize: DEFAULT_PAGE_SIZE,
            paginationSizeSelector: [10, 25, 50, 100],
            paginationDataSent: {
              page: 'page',
              size: 'size'
            },
            paginationDataReceived: {
              last_page: 'last_page',
              data: 'data'
            },
            ajaxURL: `/query/${queryId}/results`,
            ajaxURLGenerator: (url, _config, params) => {
              const page = Number(params.page) > 0 ? Number(params.page) : 1;
              const size = Number(params.size) > 0 ? Number(params.size) : DEFAULT_PAGE_SIZE;
              resultsDebugEl.textContent = `Debug: Tabulator request | page=${page} size=${size}`;
              return `${url}?page=${page}&size=${size}`;
            },
            ajaxConfig: 'GET',
            ajaxResponse: (_url, params, response) => {
              setMetaFields({
                name: response.name || '-',
                queryId: response.id || queryId,
                status: response.status || '-',
                submittedAt: metaSubmittedAtEl.textContent,
                resultReceivedAt: response.resultReceivedAt || '-'
              });
              let normalized = [];
              if (Array.isArray(response.data)) {
                normalized = normalizeTabulatorData(columns, response.data);
                const first = normalized[0] || null;
                const keyPreview =
                  first && typeof first === 'object' ? Object.keys(first).slice(0, 5).join(',') : 'none';
                resultsDebugEl.textContent =
                  `Debug: Tabulator response | page=${params.page || 1} size=${params.size || DEFAULT_PAGE_SIZE} ` +
                  `last_page=${response.last_page ?? 'n/a'} dataRows=${normalized.length} source=data keys=${keyPreview}`;
                return {
                  ...response,
                  data: normalized
                };
              }
              if (response.results && Array.isArray(response.results.rows)) {
                normalized = mapRowsToObjects(columns, response.results.rows);
                resultsDebugEl.textContent =
                  `Debug: Tabulator response | page=${params.page || 1} size=${params.size || DEFAULT_PAGE_SIZE} ` +
                  `last_page=${response.last_page ?? 'n/a'} dataRows=${normalized.length} source=results.rows`;
                return {
                  ...response,
                  data: normalized
                };
              }
              resultsDebugEl.textContent =
                `Debug: Tabulator response | page=${params.page || 1} size=${params.size || DEFAULT_PAGE_SIZE} ` +
                `last_page=${response.last_page ?? 'n/a'} dataRows=0 source=none`;
              return {
                ...response,
                data: []
              };
            },
            rowClick: (_e, row) => {
              if (row.isSelected()) {
                row.deselect();
                return;
              }
              row.select();
            }
          });
          resultsTable.setPage(1);
        } catch (error) {
          renderStatus(`Tabulator initialization failed: ${error.message}`, true);
          resultsDebugEl.textContent = `Debug: Tabulator init failed | error=${error.message}`;
          renderBasicTable(columns, initialData);
        }
      }

      async function apiRequest(url, method, body) {
        const response = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: body ? JSON.stringify(body) : undefined
        });

        const json = await response.json().catch(() => ({}));
        return { ok: response.ok, status: response.status, json };
      }

      function buildCompletionSuggestions(monacoApi, position, model) {
        const word = model.getWordUntilPosition(position);
        const range = {
          startLineNumber: position.lineNumber,
          endLineNumber: position.lineNumber,
          startColumn: word.startColumn,
          endColumn: word.endColumn
        };

        const suggestions = [];
        SQL_KEYWORDS.forEach((keyword) => {
          suggestions.push({
            label: keyword,
            kind: monacoApi.languages.CompletionItemKind.Keyword,
            insertText: keyword,
            range
          });
        });

        const tables = Array.isArray(schemaCache.tables) ? schemaCache.tables : [];
        tables.forEach((table) => {
          suggestions.push({
            label: table.name,
            kind: monacoApi.languages.CompletionItemKind.Class,
            insertText: table.name,
            detail: 'table',
            range
          });

          const columns = Array.isArray(table.columns) ? table.columns : [];
          columns.forEach((column) => {
            suggestions.push({
              label: `${table.name}.${column.name}`,
              kind: monacoApi.languages.CompletionItemKind.Field,
              insertText: `${table.name}.${column.name}`,
              detail: column.type || 'column',
              range
            });
            suggestions.push({
              label: column.name,
              kind: monacoApi.languages.CompletionItemKind.Field,
              insertText: column.name,
              detail: `${table.name} (${column.type || 'column'})`,
              range
            });
          });
        });

        return suggestions;
      }

      function setValidationMarkers(markers) {
        if (!editor || typeof monaco === 'undefined') {
          return;
        }
        const model = editor.getModel();
        if (!model) {
          return;
        }

        const mapped = (markers || []).map((marker) => ({
          startLineNumber: Math.max(1, Number(marker.line || 1)),
          startColumn: Math.max(1, Number(marker.column || 1)),
          endLineNumber: Math.max(1, Number(marker.line || 1)),
          endColumn: Math.max(2, Number(marker.column || 1) + 1),
          message: marker.message || 'Syntax error',
          severity: monaco.MarkerSeverity.Error
        }));

        monaco.editor.setModelMarkers(model, 'athena-validator', mapped);
      }

      async function runValidation() {
        if (!editor) {
          return;
        }
        if (!selectedDatabase) {
          setValidationMarkers([]);
          return;
        }
        const sql = getEditorValue().trim();
        if (!sql) {
          setValidationMarkers([]);
          return;
        }

        const res = await apiRequest('/query/validate', 'POST', {
          query: sql,
          database: selectedDatabase
        });
        if (!res.ok) {
          return;
        }

        if (res.json.valid) {
          setValidationMarkers([]);
          return;
        }

        setValidationMarkers(Array.isArray(res.json.markers) ? res.json.markers : []);
      }

      function scheduleValidation() {
        if (validateTimer) {
          clearTimeout(validateTimer);
          validateTimer = null;
        }
        validateTimer = setTimeout(() => {
          runValidation().catch(() => {
            // validation failures should not block editor usage
          });
        }, VALIDATION_DEBOUNCE_MS);
      }

      function setupMonacoEnhancements() {
        if (!editor || completionProviderRegistered || typeof monaco === 'undefined') {
          return;
        }

        monaco.languages.registerCompletionItemProvider('sql', {
          triggerCharacters: ['.', ' '],
          provideCompletionItems(model, position) {
            return {
              suggestions: buildCompletionSuggestions(monaco, position, model)
            };
          }
        });
        completionProviderRegistered = true;
        editor.onDidChangeModelContent(() => {
          scheduleValidation();
        });
      }

      function shortId(id) {
        if (!id || id.length < 12) {
          return id || '';
        }
        return `${id.slice(0, 8)}...${id.slice(-4)}`;
      }

      function setSchemaCollapsed(nextCollapsed) {
        schemaCollapsed = Boolean(nextCollapsed);
        appLayoutEl.classList.toggle('left-collapsed', schemaCollapsed);
        toggleSchemaBtn.textContent = schemaCollapsed ? '>' : '<';
        persistUiState();
      }

      function setQueryListCollapsed(nextCollapsed) {
        queryListCollapsed = Boolean(nextCollapsed);
        appLayoutEl.classList.toggle('right-collapsed', queryListCollapsed);
        toggleQueryListBtn.textContent = queryListCollapsed ? '<' : '>';
        persistUiState();
      }

      function setAssistantCollapsed(nextCollapsed) {
        assistantCollapsed = Boolean(nextCollapsed);
        assistantCardEl.classList.toggle('collapsed', assistantCollapsed);
        toggleAssistantBtn.textContent = assistantCollapsed ? '+' : '-';
        persistUiState();
      }

      function renderSchemaTree(schema) {
        const allTables = Array.isArray(schema?.tables) ? schema.tables : [];
        const filter = (schemaFilterInputEl.value || '').trim().toLowerCase();
        const tables = filter
          ? allTables.filter((table) => String(table?.name || '').toLowerCase().includes(filter))
          : allTables;

        if (allTables.length === 0) {
          schemaTreeEl.innerHTML = '<div class="meta-value">No tables found.</div>';
          return;
        }

        if (tables.length === 0) {
          schemaTreeEl.innerHTML = '<div class="meta-value">No matching tables.</div>';
          return;
        }

        const html = tables
          .map((table) => {
            let columnHtml = '';
            if (table.loadingSchema) {
              columnHtml = '<li class="schema-column-item">Loading schema...</li>';
            } else if (table.schemaError) {
              columnHtml = `<li class="schema-column-item">${escapeHtml(table.schemaError)}</li>`;
            } else if (Array.isArray(table.columns) && table.columns.length > 0) {
              columnHtml = table.columns
                .map(
                  (column) =>
                    `<li class="schema-column-item">${escapeHtml(column.name || '')} ` +
                    `<span class="schema-column-type">(${escapeHtml(column.type || 'unknown')})</span></li>`
                )
                .join('');
            } else {
              columnHtml = '<li class="schema-column-item">Expand to load schema</li>';
            }
            return (
              `<details data-table-name="${escapeHtml(table.name || '')}"><summary>${escapeHtml(table.name || '')}</summary>` +
              `<ul class="schema-columns">${columnHtml}</ul></details>`
            );
          })
          .join('');
        schemaTreeEl.innerHTML = html;

        schemaTreeEl.querySelectorAll('details[data-table-name]').forEach((detailsEl) => {
          detailsEl.addEventListener('toggle', () => {
            if (!detailsEl.open) {
              return;
            }
            const tableName = detailsEl.getAttribute('data-table-name');
            if (!tableName) {
              return;
            }
            loadTableSchema(tableName).catch((error) => {
              renderStatus(`Failed to load table schema: ${error.message}`, true);
            });
          });
        });
      }

      function renderDatabaseOptions(databases) {
        const options = Array.isArray(databases) ? databases : [];
        if (options.length === 0) {
          databaseSelectEl.innerHTML = '<option value="">No databases found</option>';
          databaseSelectEl.disabled = true;
          selectedDatabase = null;
          return;
        }

        databaseSelectEl.disabled = false;
        databaseSelectEl.innerHTML = options
          .map((name) => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`)
          .join('');

        if (!selectedDatabase || !options.includes(selectedDatabase)) {
          selectedDatabase = options[0];
        }
        databaseSelectEl.value = selectedDatabase;
      }

      async function refreshDatabases(preferDatabase) {
        const res = await apiRequest('/database', 'GET');
        if (!res.ok) {
          throw new Error(`Failed to load databases (${res.status})`);
        }

        const databases = Array.isArray(res.json.databases) ? res.json.databases : [];
        databaseList = databases;
        if (preferDatabase && databases.includes(preferDatabase)) {
          selectedDatabase = preferDatabase;
        } else if (!selectedDatabase || !databases.includes(selectedDatabase)) {
          selectedDatabase = databases[0] || null;
        }
        renderDatabaseOptions(databases);
        persistUiState();
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      async function refreshDatabasesWithRetry(preferDatabase, maxAttempts = 4) {
        let lastError = null;
        for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
          try {
            await refreshDatabases(preferDatabase);
            return;
          } catch (error) {
            lastError = error;
            renderStatus(
              `Database load attempt ${attempt}/${maxAttempts} failed: ${error.message}`,
              true
            );
            if (attempt < maxAttempts) {
              await sleep(Math.min(3000, attempt * 500));
            }
          }
        }
        throw lastError || new Error('Failed to load databases');
      }

      async function refreshSchemaTree() {
        if (!selectedDatabase) {
          schemaTreeEl.innerHTML = '<div class="meta-value">Select a database to load tables.</div>';
          return;
        }

        const res = await apiRequest(`/database/${encodeURIComponent(selectedDatabase)}/tables`, 'GET');
        if (!res.ok) {
          schemaTreeEl.innerHTML = `<div class="meta-value">Failed to load schema (${res.status}).</div>`;
          return;
        }

        const tableNames = Array.isArray(res.json.tables) ? res.json.tables : [];
        const canReuseCachedTables = schemaCache.database === selectedDatabase;
        const nextTables = tableNames.map((name) => {
          const existing = canReuseCachedTables
            ? (schemaCache.tables || []).find((table) => table.name === name)
            : null;
          if (existing) {
            return existing;
          }
          return { name, columns: null, loadingSchema: false, schemaError: null };
        });
        schemaCache = { database: selectedDatabase, tables: nextTables };
        renderSchemaTree(schemaCache);

        schemaPrefetchGeneration += 1;
        const generation = schemaPrefetchGeneration;
        prefetchTableSchemasInBackground(selectedDatabase, generation).catch(() => {
          // best-effort prefetch only
        });
      }

      async function loadTableSchema(tableName) {
        if (!selectedDatabase) {
          return;
        }

        const databaseForRequest = schemaCache.database || selectedDatabase;
        const table = (schemaCache.tables || []).find((entry) => entry.name === tableName);
        if (!table || Array.isArray(table.columns) || table.loadingSchema) {
          return;
        }

        table.loadingSchema = true;
        table.schemaError = null;
        renderSchemaTree(schemaCache);

        const res = await apiRequest(
          `/database/${encodeURIComponent(databaseForRequest)}/${encodeURIComponent(tableName)}/schema`,
          'GET'
        );

        table.loadingSchema = false;
        if (!res.ok) {
          table.schemaError = `Failed to load schema (${res.status})`;
          renderSchemaTree(schemaCache);
          return;
        }

        table.columns = Array.isArray(res.json.columns) ? res.json.columns : [];
        table.schemaError = null;
        renderSchemaTree(schemaCache);
      }

      async function prefetchTableSchemasInBackground(databaseName, generation) {
        const maxConcurrent = 4;
        const pendingTableNames = (schemaCache.tables || [])
          .filter((table) => !Array.isArray(table.columns) && !table.loadingSchema)
          .map((table) => table.name);

        let cursor = 0;
        async function worker() {
          while (cursor < pendingTableNames.length) {
            if (
              schemaPrefetchGeneration !== generation ||
              selectedDatabase !== databaseName ||
              schemaCache.database !== databaseName
            ) {
              return;
            }

            const currentIndex = cursor;
            cursor += 1;
            const tableName = pendingTableNames[currentIndex];
            try {
              await loadTableSchema(tableName);
            } catch (_error) {
              // per-table failure is rendered inline
            }
          }
        }

        const workerCount = Math.min(maxConcurrent, pendingTableNames.length);
        const workers = [];
        for (let i = 0; i < workerCount; i += 1) {
          workers.push(worker());
        }
        await Promise.all(workers);
      }

      function setSelectedQuery(id) {
        selectedQueryId = id;
        persistUiState();
      }

      function persistUiState() {
        try {
          window.localStorage.setItem(
            UI_STATE_STORAGE_KEY,
            JSON.stringify({
              schemaCollapsed,
              queryListCollapsed,
              assistantCollapsed,
              selectedQueryId,
              selectedDatabase
            })
          );
        } catch (_error) {
          // ignore local storage failures
        }
      }

      function restoreUiState() {
        try {
          const raw = window.localStorage.getItem(UI_STATE_STORAGE_KEY);
          if (!raw) {
            return;
          }
          const state = JSON.parse(raw);
          if (typeof state.schemaCollapsed === 'boolean') {
            schemaCollapsed = state.schemaCollapsed;
          }
          if (typeof state.queryListCollapsed === 'boolean') {
            queryListCollapsed = state.queryListCollapsed;
          }
          if (typeof state.assistantCollapsed === 'boolean') {
            assistantCollapsed = state.assistantCollapsed;
          }
          if (typeof state.selectedQueryId === 'string' && state.selectedQueryId.trim() !== '') {
            selectedQueryId = state.selectedQueryId;
          }
          if (typeof state.selectedDatabase === 'string' && state.selectedDatabase.trim() !== '') {
            selectedDatabase = state.selectedDatabase;
          }
        } catch (_error) {
          // ignore malformed state
        }
      }

      function renderQueryList(queries) {
        queryListItemsEl.innerHTML = '';
        if (!Array.isArray(queries) || queries.length === 0) {
          queryListItemsEl.innerHTML = '<div class="meta-value">No queries yet.</div>';
          return;
        }

        queries.forEach((query) => {
          const item = document.createElement('button');
          item.type = 'button';
          item.className = 'query-item';
          if (query.id === selectedQueryId) {
            item.classList.add('active');
          }
          item.innerHTML =
            `<div class="query-item-id">${escapeHtml(query.name || query.id)}</div>` +
            `<div class="query-item-meta">${escapeHtml(query.status || 'UNKNOWN')} | ${escapeHtml(shortId(query.id))}</div>`;
          item.addEventListener('click', () => {
            loadQueryById(query.id).catch((error) => {
              renderStatus(`Failed to load query ${query.id}: ${error.message}`, true);
            });
          });
          queryListItemsEl.appendChild(item);
        });
      }

      async function refreshQueryList(preferSelectId) {
        const res = await apiRequest('/query', 'GET');
        if (!res.ok) {
          renderStatus(`Failed to refresh query list (${res.status})`, true);
          return;
        }

        const queries = Array.isArray(res.json.queries) ? res.json.queries : [];
        if (preferSelectId) {
          setSelectedQuery(preferSelectId);
        } else if (selectedQueryId && !queries.find((q) => q.id === selectedQueryId)) {
          setSelectedQuery(null);
          syncAssistantForQuery(null).catch(() => {
            // ignore assistant reset failures
          });
        }

        renderQueryList(queries);
      }

      function clearAssistantStatusPolling() {
        if (assistantStatusTimer) {
          clearInterval(assistantStatusTimer);
          assistantStatusTimer = null;
        }
        assistantPollQueryId = null;
      }

      async function fetchAssistantMessages(queryId) {
        if (!queryId) {
          renderAssistantMessages([]);
          return;
        }

        const res = await apiRequest(`/query/${queryId}/assistant/messages`, 'GET');
        if (!res.ok) {
          renderAssistantMessages([]);
          return;
        }
        renderAssistantMessages(Array.isArray(res.json.messages) ? res.json.messages : []);
      }

      async function pollAssistantStatus(queryId, options = {}) {
        if (!queryId) {
          clearAssistantStatusPolling();
          setAssistantRunStatus('IDLE', null);
          return;
        }
        if (selectedQueryId !== queryId) {
          clearAssistantStatusPolling();
          return;
        }

        const shouldRefreshMessagesOnIdle = options.refreshMessagesOnIdle !== false;
        const res = await apiRequest(`/query/${queryId}/assistant/status`, 'GET');
        if (!res.ok) {
          renderStatus(`Assistant status failed (${res.status})`, true);
          return;
        }

        const nextStatus = res.json.runStatus || 'IDLE';
        setAssistantRunStatus(nextStatus, res.json.runStartedAt || null);
        if (nextStatus === 'FAILED' && res.json.lastErrorMessage) {
          renderStatus(`Assistant failed: ${res.json.lastErrorMessage}`, true);
        }

        if (nextStatus === 'RUNNING' || nextStatus === 'CANCELLING') {
          return;
        }

        clearAssistantStatusPolling();
        if (shouldRefreshMessagesOnIdle) {
          await fetchAssistantMessages(queryId);
        }
      }

      function startAssistantStatusPolling(queryId) {
        clearAssistantStatusPolling();
        assistantPollQueryId = queryId;
        pollAssistantStatus(queryId).catch((error) => {
          renderStatus(`Assistant polling error: ${error.message}`, true);
        });

        assistantStatusTimer = setInterval(() => {
          if (!assistantPollQueryId) {
            clearAssistantStatusPolling();
            return;
          }
          pollAssistantStatus(assistantPollQueryId).catch((error) => {
            renderStatus(`Assistant polling error: ${error.message}`, true);
          });
        }, 2000);
      }

      async function syncAssistantForQuery(queryId) {
        if (!queryId) {
          clearAssistantStatusPolling();
          stopAssistantElapsedTimer();
          assistantRunStartedAt = null;
          assistantPendingUserMessage = null;
          assistantThinking = false;
          assistantServerMessages = [];
          setAssistantRunStatus('IDLE', null);
          renderAssistantMessages([]);
          return;
        }

        await pollAssistantStatus(queryId, { refreshMessagesOnIdle: false });
        await fetchAssistantMessages(queryId);
        if (assistantRunStatus === 'RUNNING' || assistantRunStatus === 'CANCELLING') {
          startAssistantStatusPolling(queryId);
        }
      }

      async function sendAssistantPrompt() {
        if (!selectedQueryId) {
          renderStatus('Select or create a query before messaging assistant.', true);
          return;
        }

        const prompt = (assistantPromptInputEl.value || '').trim();
        if (!prompt) {
          renderStatus('Assistant prompt is required.', true);
          return;
        }

        assistantPendingUserMessage = prompt;
        assistantThinking = true;
        assistantPromptInputEl.value = '';
        renderAssistantThread();
        sendAssistantBtn.disabled = true;
        try {
          const res = await apiRequest(`/query/${selectedQueryId}/assistant/send`, 'POST', { prompt });
          if (res.ok) {
            setAssistantRunStatus(res.json.runStatus || 'RUNNING', res.json.runStartedAt || null);
            renderStatus('Assistant prompt submitted.', false);
            startAssistantStatusPolling(selectedQueryId);
            return;
          }

          if (res.status === 409 && res.json?.error === 'ASSISTANT_RUN_ACTIVE') {
            assistantPendingUserMessage = null;
            assistantPromptInputEl.value = prompt;
            setAssistantRunStatus(res.json.runStatus || 'RUNNING', assistantRunStartedAt ? assistantRunStartedAt.toISOString() : null);
            renderStatus('Assistant run already in progress.', true);
            startAssistantStatusPolling(selectedQueryId);
            return;
          }

          assistantPendingUserMessage = null;
          assistantThinking = false;
          assistantPromptInputEl.value = prompt;
          renderAssistantThread();
          renderStatus(`Assistant send failed (${res.status}): ${res.json.message || 'unknown error'}`, true);
        } catch (error) {
          assistantPendingUserMessage = null;
          assistantThinking = false;
          assistantPromptInputEl.value = prompt;
          renderAssistantThread();
          renderStatus(`Assistant send error: ${error.message}`, true);
        } finally {
          if (!(assistantRunStatus === 'RUNNING' || assistantRunStatus === 'CANCELLING')) {
            sendAssistantBtn.disabled = false;
          }
        }
      }

      async function cancelAssistantRun() {
        if (!selectedQueryId) {
          renderStatus('Select a query to cancel assistant run.', true);
          return;
        }

        try {
          const res = await apiRequest(`/query/${selectedQueryId}/assistant/cancel`, 'POST', {});
          if (!res.ok) {
            renderStatus(`Assistant cancel failed (${res.status}): ${res.json.message || 'unknown error'}`, true);
            return;
          }
          setAssistantRunStatus(res.json.runStatus || 'CANCELLING', assistantRunStartedAt ? assistantRunStartedAt.toISOString() : null);
          renderStatus('Assistant cancellation requested.', false);
          startAssistantStatusPolling(selectedQueryId);
        } catch (error) {
          renderStatus(`Assistant cancel error: ${error.message}`, true);
        }
      }

      async function loadQueryById(id) {
        setSelectedQuery(id);
        await refreshQueryList(id);
        await syncAssistantForQuery(id);

        const statusRes = await apiRequest(`/query/${id}/status`, 'GET');
        if (!statusRes.ok) {
          renderStatus(`Failed to load query status (${statusRes.status})`, true);
          return;
        }

        const query = statusRes.json;
        if (query.database && query.database !== selectedDatabase) {
          selectedDatabase = query.database;
          renderDatabaseOptions(databaseList);
          persistUiState();
          await refreshSchemaTree();
        }
        setMetaFields({
          name: query.name || '-',
          queryId: query.id || id,
          status: query.status || '-',
          submittedAt: query.submittedAt || '-',
          resultReceivedAt: query.resultReceivedAt || '-'
        });
        if (typeof query.query === 'string' && query.query.length > 0) {
          setEditorValue(query.query);
        }

        if (query.status === 'SUCCEEDED') {
          await fetchResults(id);
          return;
        }

        if (query.status === 'RUNNING') {
          renderStatus(`Loaded query ${id}. Query is still running.`, false);
          renderJson({ message: `Query ${id} is still running.` });
          startPolling(id);
          return;
        }

        clearPolling();
        renderStatus(`Loaded query ${id} with state ${query.status}.`, query.status !== 'CANCELLED');
        renderJson({ message: `No results available for query in state ${query.status}.`, status: query.status });
      }

      async function saveQueryNameIfChanged() {
        if (!selectedQueryId) {
          return;
        }

        const nextName = (metaNameEl.value || '').trim();
        const lastSaved = metaNameEl.dataset.lastSavedValue || '';
        if (!nextName || nextName === lastSaved) {
          metaNameEl.value = lastSaved;
          return;
        }

        const res = await apiRequest(`/query/${selectedQueryId}`, 'PUT', { name: nextName });
        if (!res.ok) {
          renderStatus(`Failed to save query name (${res.status})`, true);
          metaNameEl.value = lastSaved;
          return;
        }

        metaNameEl.dataset.lastSavedValue = res.json.name || nextName;
        metaNameEl.value = res.json.name || nextName;
        renderStatus(`Saved query name for ${selectedQueryId}`, false);
        await refreshQueryList(selectedQueryId);
      }

      function clearPolling() {
        if (pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
        }
      }

      function clearSelectedQueryView() {
        setSelectedQuery(null);
        setMetaFields({
          name: '',
          queryId: '-',
          status: '-',
          submittedAt: '-',
          resultReceivedAt: '-'
        });
        setEditorValue('');
        renderJson({ message: 'No query selected yet.' });
        assistantPromptInputEl.value = '';
        syncAssistantForQuery(null).catch(() => {
          // ignore assistant reset failures
        });
      }

      async function fetchResults(id) {
        const res = await apiRequest(`/query/${id}/results?limit=${DEFAULT_PAGE_SIZE}&offset=0`, 'GET');
        if (res.ok) {
          setMetaFields({
            name: res.json.name || '-',
            queryId: res.json.id,
            status: res.json.status,
            submittedAt: metaSubmittedAtEl.textContent,
            resultReceivedAt: res.json.resultReceivedAt
          });
          renderStatus(`Query ${id} completed. Results received at ${res.json.resultReceivedAt}.`);
          const resultPayload = res.json.results;
          if (resultPayload && Array.isArray(resultPayload.columns)) {
            renderTabulatorTable(id, resultPayload.columns, res.json.data || resultPayload.rows || []);
          } else {
            renderJson(resultPayload || res.json);
          }
          return;
        }

        renderStatus(`Results unavailable for query ${id}: ${res.json.message || 'unknown error'}`, true);
        renderJson(res.json);
      }

      async function pollStatus(id) {
        const res = await apiRequest(`/query/${id}/status`, 'GET');
        if (!res.ok) {
          renderStatus(`Failed to poll status (${res.status}) for ${id}`, true);
          clearPolling();
          return;
        }

        const state = res.json.status;
        setMetaFields({
          name: res.json.name || '-',
          queryId: res.json.id || id,
          status: res.json.status,
          submittedAt: res.json.submittedAt || '-',
          resultReceivedAt: res.json.resultReceivedAt || '-'
        });
        renderStatus(`Query ${id} status: ${state}`);

        if (state === 'RUNNING') {
          return;
        }

        clearPolling();

        if (state === 'SUCCEEDED') {
          await fetchResults(id);
          return;
        }

        renderStatus(`Query ${id} ended in state: ${state}`, state !== 'CANCELLED');
      }

      function startPolling(id) {
        clearPolling();
        pollStatus(id).catch((err) => {
          renderStatus(`Polling error: ${err.message}`, true);
        });

        pollTimer = setInterval(() => {
          pollStatus(id).catch((err) => {
            renderStatus(`Polling error: ${err.message}`, true);
            clearPolling();
          });
        }, 2000);
      }

      submitBtn.addEventListener('click', async () => {
        if (!selectedDatabase) {
          renderStatus('Select an Athena database first.', true);
          return;
        }

        const sql = getEditorValue().trim();
        if (!sql) {
          renderStatus('Query text is required.', true);
          return;
        }

        submitBtn.disabled = true;
        renderStatus('Submitting query...');

        try {
          if (!selectedQueryId) {
            const createRes = await apiRequest('/query', 'POST', {
              query: sql,
              database: selectedDatabase
            });
            if (!createRes.ok) {
              renderStatus(
                `Create failed (${createRes.status}): ${createRes.json.message || 'unknown error'}`,
                true
              );
              renderJson(createRes.json);
              return;
            }

            const id = createRes.json.id;
            setSelectedQuery(id);
            renderStatus(`Query submitted: ${id}`);
            renderJson({ message: `Query ${id} submitted. Waiting for results...` });
            await refreshQueryList(id);
            await syncAssistantForQuery(id);
            startPolling(id);
            return;
          }

          const updateRes = await apiRequest(`/query/${selectedQueryId}`, 'PUT', {
            query: sql,
            database: selectedDatabase
          });
          if (!updateRes.ok) {
            renderStatus(
              `Update failed (${updateRes.status}): ${updateRes.json.message || 'unknown error'}`,
              true
            );
            renderJson(updateRes.json);
            return;
          }

          const refreshRes = await apiRequest(`/query/${selectedQueryId}/refresh`, 'POST', {});
          if (!refreshRes.ok) {
            renderStatus(
              `Refresh failed (${refreshRes.status}): ${refreshRes.json.message || 'unknown error'}`,
              true
            );
            renderJson(refreshRes.json);
            if (refreshRes.json?.error === 'QUERY_RUNNING') {
              startPolling(selectedQueryId);
            }
            return;
          }

          renderStatus(`Query updated and refreshed: ${selectedQueryId}`);
          renderJson({ message: `Query ${selectedQueryId} refreshed. Waiting for results...` });
          await refreshQueryList(selectedQueryId);
          startPolling(selectedQueryId);
        } catch (err) {
          renderStatus(`Submit error: ${err.message}`, true);
        } finally {
          submitBtn.disabled = false;
        }
      });

      fallbackEditorEl.addEventListener('keydown', (event) => {
        if (!isSubmitShortcut(event)) {
          return;
        }
        event.preventDefault();
        submitBtn.click();
      });

      metaNameEl.addEventListener('blur', () => {
        saveQueryNameIfChanged().catch((error) => {
          renderStatus(`Failed to save query name: ${error.message}`, true);
        });
      });

      newQueryBtn.addEventListener('click', () => {
        clearPolling();
        clearSelectedQueryView();
        refreshQueryList().catch((error) => {
          renderStatus(`Failed to refresh query list: ${error.message}`, true);
        });
        renderStatus('Started a new query draft.', false);
      });

      refreshListBtn.addEventListener('click', () => {
        refreshQueryList(selectedQueryId).catch((error) => {
          renderStatus(`Failed to refresh query list: ${error.message}`, true);
        });
      });

      deleteQueryBtn.addEventListener('click', () => {
        if (!selectedQueryId) {
          renderStatus('Select a query to delete.', true);
          return;
        }

        const idToDelete = selectedQueryId;
        apiRequest(`/query/${idToDelete}`, 'DELETE')
          .then(async (res) => {
            if (!res.ok) {
              renderStatus(`Delete failed (${res.status}): ${res.json.message || 'unknown error'}`, true);
              return;
            }

            clearPolling();
            clearSelectedQueryView();
            await refreshQueryList();
            renderStatus(`Deleted query ${idToDelete}`, false);
          })
          .catch((error) => {
            renderStatus(`Delete failed: ${error.message}`, true);
          });
      });

      refreshSchemaBtn.addEventListener('click', () => {
        refreshSchemaTree().catch((error) => {
          renderStatus(`Failed to refresh schema: ${error.message}`, true);
        });
      });

      databaseSelectEl.addEventListener('change', () => {
        selectedDatabase = databaseSelectEl.value || null;
        persistUiState();
        refreshSchemaTree().catch((error) => {
          renderStatus(`Failed to refresh schema: ${error.message}`, true);
        });
      });

      schemaFilterInputEl.addEventListener('input', () => {
        renderSchemaTree(schemaCache);
      });

      toggleSchemaBtn.addEventListener('click', () => {
        setSchemaCollapsed(!schemaCollapsed);
      });

      toggleQueryListBtn.addEventListener('click', () => {
        setQueryListCollapsed(!queryListCollapsed);
      });

      toggleAssistantBtn.addEventListener('click', () => {
        setAssistantCollapsed(!assistantCollapsed);
      });

      sendAssistantBtn.addEventListener('click', () => {
        sendAssistantPrompt().catch((error) => {
          renderStatus(`Assistant send error: ${error.message}`, true);
        });
      });

      cancelAssistantBtn.addEventListener('click', () => {
        cancelAssistantRun().catch((error) => {
          renderStatus(`Assistant cancel error: ${error.message}`, true);
        });
      });

      downloadResultsBtn.addEventListener('click', async () => {
        if (!selectedQueryId) {
          renderStatus('Select a query before downloading results.', true);
          return;
        }

        const format = String(downloadFormatEl.value || 'csv').trim().toLowerCase();
        downloadResultsBtn.disabled = true;
        try {
          const response = await fetch(
            `/query/${selectedQueryId}/results/download?format=${encodeURIComponent(format)}`,
            { method: 'GET' }
          );

          if (!response.ok) {
            const errorJson = await response.json().catch(() => ({}));
            throw new Error(errorJson.message || `Download failed (${response.status})`);
          }

          const blob = await response.blob();
          const fallbackName = `query-${selectedQueryId}.${format === 'excel' ? 'xlsx' : format}`;
          const fileName = parseDownloadFileName(
            response.headers.get('Content-Disposition'),
            fallbackName
          );

          const objectUrl = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = objectUrl;
          link.download = fileName;
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(objectUrl);

          renderStatus(`Downloaded full results as ${fileName}`, false);
        } catch (error) {
          renderStatus(`Download failed: ${error.message}`, true);
        } finally {
          downloadResultsBtn.disabled = false;
        }
      });

      assistantPromptInputEl.addEventListener('keydown', (event) => {
        if (!isSubmitShortcut(event)) {
          return;
        }
        event.preventDefault();
        sendAssistantPrompt().catch((error) => {
          renderStatus(`Assistant send error: ${error.message}`, true);
        });
      });

      assistantResponseEl.addEventListener('click', (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) {
          return;
        }

        const button = target.closest('button[data-assistant-index]');
        if (!button) {
          return;
        }

        const index = Number(button.getAttribute('data-assistant-index'));
        if (!Number.isInteger(index) || index < 0 || index >= assistantVisibleMessages.length) {
          return;
        }

        const message = assistantVisibleMessages[index];
        if (!message || message.role !== 'assistant') {
          return;
        }

        setEditorValue(message.content || '');
        if (fallbackMode) {
          fallbackEditorEl.focus();
        } else if (editor) {
          editor.focus();
        }
        renderStatus('Copied assistant response into query editor.', false);
      });

      window.addEventListener('beforeunload', () => {
        clearPolling();
        clearAssistantStatusPolling();
        stopAssistantElapsedTimer();
        if (validateTimer) {
          clearTimeout(validateTimer);
          validateTimer = null;
        }
        if (queryListTimer) {
          clearInterval(queryListTimer);
          queryListTimer = null;
        }
      });

      async function initializeAppState() {
        await refreshDatabasesWithRetry(selectedDatabase);
        await refreshSchemaTree();
        await refreshQueryList(selectedQueryId);
        if (selectedQueryId) {
          await loadQueryById(selectedQueryId);
        }
      }

      function startQueryListAutoRefresh() {
        if (queryListTimer) {
          clearInterval(queryListTimer);
        }
        queryListTimer = setInterval(() => {
          refreshQueryList(selectedQueryId).catch((error) => {
            renderStatus(`Failed to refresh query list: ${error.message}`, true);
          });
        }, 10000);
      }

      function onMonacoReady() {
        try {
          editor = monaco.editor.create(document.getElementById('editor'), {
            value: 'SELECT current_timestamp AS ts;',
            language: 'sql',
            theme: 'vs',
            minimap: { enabled: false },
            automaticLayout: true,
            fontSize: 14,
            fontFamily: 'IBM Plex Mono, monospace',
            padding: { top: 12, bottom: 12 },
            scrollBeyondLastLine: false,
            readOnly: false,
            domReadOnly: false
          });
          restoreUiState();
          setSchemaCollapsed(schemaCollapsed);
          setQueryListCollapsed(queryListCollapsed);
          setAssistantCollapsed(assistantCollapsed);
          setAssistantRunStatus('IDLE', null);
          setupMonacoEnhancements();
          editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, () => {
            submitBtn.click();
          });
          scheduleValidation();
          initializeAppState()
            .then(async () => {
              startQueryListAutoRefresh();
            })
            .catch((error) => {
              renderStatus(`Failed to initialize app state: ${error.message}`, true);
            });
        } catch (error) {
          renderStatus(`Monaco initialization failed: ${error.message}`, true);
          onMonacoUnavailable();
        }
      }

      function onMonacoUnavailable() {
        try {
          enableFallbackEditor('SELECT current_timestamp AS ts;');
          restoreUiState();
          setSchemaCollapsed(schemaCollapsed);
          setQueryListCollapsed(queryListCollapsed);
          setAssistantCollapsed(assistantCollapsed);
          setAssistantRunStatus('IDLE', null);
          initializeAppState()
            .then(async () => {
              startQueryListAutoRefresh();
            })
            .catch((error) => {
              renderStatus(`Failed to initialize app state: ${error.message}`, true);
            });
        } catch (error) {
          renderStatus(`Fallback initialization failed: ${error.message}`, true);
        }
      }

      if (typeof window.require === 'function') {
        window.require(
          ['vs/editor/editor.main'],
          () => {
            onMonacoReady();
          },
          () => {
            onMonacoUnavailable();
          }
        );
      } else {
        onMonacoUnavailable();
      }
    </script>
  </body>
</html>
